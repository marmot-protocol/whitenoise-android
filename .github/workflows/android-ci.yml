name: Android CI

# Required validation CI for the Android client. Runs the same checks a
# contributor should run locally before pushing (see README "Continuous
# Integration"). Debug variant only: no signing secrets, no google-services.json,
# so this never depends on release/Play/Zapstore credentials.
#
# Scope: compile + unit tests + ktlint + Android lint. APK build artifacts are a
# separate workflow (see issue #247).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same ref so a force-push or rapid re-push does
# not pile up redundant CI.
concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Compile, test, ktlint, Android lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # AGP 9.x / Gradle 9.4.1 require JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Configures the Gradle wrapper and caches dependencies + build state
      # across runs (read/write on master pushes, read-only on PRs).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile (Kotlin)
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: ktlint
        run: ./gradlew :app:ktlintCheck --no-daemon --stacktrace

      - name: Android lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      # Surface failure details (unit-test HTML/XML, lint reports) on red runs.
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
