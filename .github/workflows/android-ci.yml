name: Android CI

# Required validation CI for the Android client. Runs the same checks a
# contributor should run locally before pushing (see README "Continuous
# Integration"). Dev debug variant only: no signing secrets, no
# google-services.json, so this never depends on release/Play/Zapstore
# credentials.
#
# Scope: compile + unit tests + ktlint + Android lint. APK build artifacts are a
# separate workflow (see issue #247).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel superseded runs on the same ref so a force-push or rapid re-push does
# not pile up redundant CI.
concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Compile, test, ktlint, Android lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # AGP 9.x / Gradle 9.4.1 require JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # Configures the Gradle wrapper and caches dependencies + build state
      # across runs (read/write on master pushes, read-only on PRs).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile (Kotlin)
        run: ./gradlew :app:compileDevDebugKotlin --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDevDebugUnitTest --no-daemon --stacktrace

      # Roborazzi Compose screenshot pilot (issue #551). Verifies the committed
      # baselines under app/src/test/snapshots/ against freshly rendered output
      # so visual regressions (e.g. the AMOLED true-black class, #446/#495) fail
      # the build instead of shipping. Runs on the JVM via Robolectric — no
      # emulator, so it adds no device-test runtime. Re-baseline after an
      # intentional UI change with `./gradlew :app:recordRoborazziDevDebug` (see
      # README "Screenshot tests").
      - name: Screenshot tests (Roborazzi)
        run: ./gradlew :app:verifyRoborazziDevDebug --no-daemon --stacktrace

      - name: ktlint
        run: ./gradlew :app:ktlintCheck --no-daemon --stacktrace

      - name: Android lint
        run: ./gradlew :app:lintDevDebug --no-daemon --stacktrace

      # Coverage visibility only (phase 1): generate the Kover report and publish
      # it as an artifact. No thresholds/gates — non-blocking, never fails the
      # build. DevDebug variant only: the aggregate kover tasks pull in the release
      # variant, whose packaging trips the unsigned-release guard (no signing in
      # CI), so the DevDebug tasks scope coverage to what the unit tests exercise.
      - name: Coverage report (Kover)
        if: always()
        continue-on-error: true
        run: ./gradlew :app:koverXmlReportDevDebug :app:koverHtmlReportDevDebug --no-daemon --stacktrace

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-coverage-report
          path: |
            app/build/reports/kover/
          if-no-files-found: ignore
          retention-days: 7

      # Surface failure details (unit-test HTML/XML, lint reports, and Roborazzi
      # screenshot diff/compare/actual images) on red runs. The roborazzi output
      # dir holds *_compare.png / *_actual.png for any screenshot that diverged
      # from its committed baseline, so a UI regression is inspectable from the
      # workflow artifacts without re-running locally.
      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-ci-reports
          path: |
            app/build/reports/
            app/build/test-results/
            app/build/outputs/roborazzi/
          if-no-files-found: ignore
          retention-days: 7
