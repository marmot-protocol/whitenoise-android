name: Android Staging APK

# Builds a signed staging APK for internal installation. This intentionally
# stays separate from android-ci.yml: PR validation remains credential-free,
# while master pushes can produce a downloadable staging artifact.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: android-staging-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build signed staging APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # AGP 9.x / Gradle 9.4.1 require JDK 17.
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Check staging secrets
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
          WHITENOISE_STAGING_KEYSTORE_BASE64: ${{ secrets.WHITENOISE_STAGING_KEYSTORE_BASE64 }}
          WHITENOISE_STAGING_KEYSTORE_PASSWORD: ${{ secrets.WHITENOISE_STAGING_KEYSTORE_PASSWORD }}
          WHITENOISE_STAGING_KEY_ALIAS: ${{ secrets.WHITENOISE_STAGING_KEY_ALIAS }}
          WHITENOISE_STAGING_KEY_PASSWORD: ${{ secrets.WHITENOISE_STAGING_KEY_PASSWORD }}
          WHITENOISE_STAGING_OTLP_ENDPOINT: ${{ secrets.WHITENOISE_STAGING_OTLP_ENDPOINT }}
          WHITENOISE_STAGING_OTLP_AUTH_TOKEN: ${{ secrets.WHITENOISE_STAGING_OTLP_AUTH_TOKEN }}
          WHITENOISE_STAGING_AUDIT_LOG_ENDPOINT: ${{ secrets.WHITENOISE_STAGING_AUDIT_LOG_ENDPOINT }}
          WHITENOISE_STAGING_AUDIT_LOG_AUTH_TOKEN: ${{ secrets.WHITENOISE_STAGING_AUDIT_LOG_AUTH_TOKEN }}
          WHITENOISE_STAGING_TELEMETRY_TENANT: ${{ secrets.WHITENOISE_STAGING_TELEMETRY_TENANT }}
          WHITENOISE_STAGING_PUSH_SERVER_PUBKEY_HEX: ${{ secrets.WHITENOISE_STAGING_PUSH_SERVER_PUBKEY_HEX }}
          WHITENOISE_STAGING_PUSH_RELAY_HINT: ${{ secrets.WHITENOISE_STAGING_PUSH_RELAY_HINT }}
        shell: bash
        run: |
          set -euo pipefail

          required=(
            ANDROID_GOOGLE_SERVICES_JSON_BASE64
            WHITENOISE_STAGING_KEYSTORE_BASE64
            WHITENOISE_STAGING_KEYSTORE_PASSWORD
            WHITENOISE_STAGING_KEY_ALIAS
            WHITENOISE_STAGING_KEY_PASSWORD
            WHITENOISE_STAGING_OTLP_ENDPOINT
            WHITENOISE_STAGING_OTLP_AUTH_TOKEN
            WHITENOISE_STAGING_AUDIT_LOG_ENDPOINT
            WHITENOISE_STAGING_AUDIT_LOG_AUTH_TOKEN
            WHITENOISE_STAGING_TELEMETRY_TENANT
            WHITENOISE_STAGING_PUSH_SERVER_PUBKEY_HEX
            WHITENOISE_STAGING_PUSH_RELAY_HINT
          )

          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing staging CI secret(s):\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Write Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          package_name = "dev.ipf.whitenoise.android.staging"
          config = json.loads(Path("app/google-services.json").read_text())
          packages = [
              client.get("client_info", {})
              .get("android_client_info", {})
              .get("package_name")
              for client in config.get("client", [])
          ]
          if package_name not in packages:
              raise SystemExit(f"google-services.json is missing client for {package_name}")
          PY

      - name: Decode staging keystore
        env:
          WHITENOISE_STAGING_KEYSTORE_BASE64: ${{ secrets.WHITENOISE_STAGING_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          keystore_path="$RUNNER_TEMP/whitenoise-staging-release.p12"
          printf '%s' "$WHITENOISE_STAGING_KEYSTORE_BASE64" \
            | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          printf 'WHITENOISE_STAGING_KEYSTORE_PATH=%s\n' "$keystore_path" >> "$GITHUB_ENV"

      - name: Build staging APK
        env:
          WHITENOISE_STAGING_KEYSTORE_PASSWORD: ${{ secrets.WHITENOISE_STAGING_KEYSTORE_PASSWORD }}
          WHITENOISE_STAGING_KEY_ALIAS: ${{ secrets.WHITENOISE_STAGING_KEY_ALIAS }}
          WHITENOISE_STAGING_KEY_PASSWORD: ${{ secrets.WHITENOISE_STAGING_KEY_PASSWORD }}
          WHITENOISE_STAGING_OTLP_ENDPOINT: ${{ secrets.WHITENOISE_STAGING_OTLP_ENDPOINT }}
          WHITENOISE_STAGING_OTLP_AUTH_TOKEN: ${{ secrets.WHITENOISE_STAGING_OTLP_AUTH_TOKEN }}
          WHITENOISE_STAGING_AUDIT_LOG_ENDPOINT: ${{ secrets.WHITENOISE_STAGING_AUDIT_LOG_ENDPOINT }}
          WHITENOISE_STAGING_AUDIT_LOG_AUTH_TOKEN: ${{ secrets.WHITENOISE_STAGING_AUDIT_LOG_AUTH_TOKEN }}
          WHITENOISE_STAGING_TELEMETRY_TENANT: ${{ secrets.WHITENOISE_STAGING_TELEMETRY_TENANT }}
          WHITENOISE_STAGING_PUSH_SERVER_PUBKEY_HEX: ${{ secrets.WHITENOISE_STAGING_PUSH_SERVER_PUBKEY_HEX }}
          WHITENOISE_STAGING_PUSH_RELAY_HINT: ${{ secrets.WHITENOISE_STAGING_PUSH_RELAY_HINT }}
        run: ./scripts/release.sh --skip-bindings --flavor staging --abi arm64-v8a

      - name: Upload staging APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: whitenoise-staging-v8a-release
          path: app/build/outputs/apk/staging/release/whitenoise-staging-v8a-release-*.apk
          if-no-files-found: error
          retention-days: 30
