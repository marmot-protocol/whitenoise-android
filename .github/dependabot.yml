# Dependabot configuration for darkmatter-android.
#
# Scope is deliberately narrow: keep GitHub Actions and the hand-pinned gradle
# deps in gradle/libs.versions.toml current, and stay out of the way of the
# Compose BOM and Firebase BOM (which already pin their members transitively).
#
# Dependabot PRs are gated by the existing android-ci.yml workflow (compile +
# unit tests + ktlint + Android lint) exactly like any other PR, so a breaking
# minor/major bump cannot land green without passing CI.
version: 2
updates:
  # GitHub Actions used by .github/workflows/android-ci.yml
  # (actions/checkout, actions/setup-java, gradle/actions/setup-gradle,
  # actions/upload-artifact). Grouped into one PR so a multi-action bump does
  # not fan out into several PRs.
  #
  # Note: open-pull-requests-limit is per ecosystem, not repo-wide. Actions are
  # grouped into a single PR, so this ecosystem contributes at most one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  # Gradle version catalog (gradle/libs.versions.toml) + build scripts.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Kotlin stdlib/plugins and kotlinx (coroutines) move together.
      kotlin:
        patterns: ["org.jetbrains.kotlin*", "org.jetbrains.kotlinx*"]
      # CameraX artifacts share a single version.ref (cameraX) -> one PR.
      camerax:
        patterns: ["androidx.camera:*"]
      # Media3 artifacts share a single version.ref (media3) -> one PR.
      media3:
        patterns: ["androidx.media3:*"]
      # Firebase, the Google Services plugin, and Play Services move together.
      # "com.google.gms*" matches the google-services plugin id; the explicit
      # "com.google.android.gms:*" pattern is needed for play-services-base
      # (the plugin-id glob does not cover the gms artifact group).
      firebase:
        patterns:
          ["com.google.firebase:*", "com.google.gms*", "com.google.android.gms:*"]
    ignore:
      # Intentional alpha pin documented in gradle/libs.versions.toml — see the
      # comment on `material3 = "1.5.0-alpha20"`. The QuickActionFabMenu uses
      # expressive FAB-menu APIs that only ship on the 1.5.0-alpha line. Revisit
      # when 1.5.0 beta/rc/stable carries those APIs.
      - dependency-name: "androidx.compose.material3:material3"
      # Compose-BOM managed — bumping individual compose libs would fight the BOM.
      - dependency-name: "androidx.compose.ui:*"
      - dependency-name: "androidx.compose.material:*"
      # Firebase-BOM managed.
      - dependency-name: "com.google.firebase:firebase-messaging-ktx"
