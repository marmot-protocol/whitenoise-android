# Pin every Robolectric-backed unit test to one SDK so screenshot baselines are
# deterministic. Robolectric 4.16.1 ships android-all shadow jars up to API 36,
# so 36 is the newest it can actually load; per-test @Config(sdk=[36]) mirrors
# this for clarity. Graphics mode is set per test via @GraphicsMode(NATIVE) so
# Compose renders real pixels rather than a no-op canvas.
sdk=36
